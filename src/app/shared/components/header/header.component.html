<div class="header">
  <app-logo></app-logo>

  <mat-form-field class="search-field" appearance="outline" subscriptSizing="dynamic">
    <mat-icon matPrefix>search</mat-icon>
    <input
      matInput
      type="search"
      placeholder="Search items…"
      (input)="onSearch($event)"
    />
  </mat-form-field>

  <a
    mat-icon-button
    href="https://github.com/osekom"
    target="_blank"
    rel="noopener noreferrer"
    matTooltip="GitHub profile"
    aria-label="GitHub profile"
  >
    <mat-icon svgIcon="github"></mat-icon>
  </a>

  <button
    mat-icon-button
    class="theme-toggle"
    (click)="themeService.toggle()"
    [matTooltip]="themeService.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
  >
    <mat-icon>{{ themeService.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
</div>
